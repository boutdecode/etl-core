name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    # -------------------------------------------------------------------------
    # Code style
    # -------------------------------------------------------------------------
    ecs:
        name: "ECS (code style)"
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.3"
                  coverage: none

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction --no-plugins

            - name: Run ECS
              run: composer ecs

    # -------------------------------------------------------------------------
    # Static analysis
    # -------------------------------------------------------------------------
    phpstan:
        name: "PHPStan (level max)"
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.3"
                  coverage: none

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Run PHPStan
              run: composer phpstan

    # -------------------------------------------------------------------------
    # Test suite — matrix: PHP 8.3 / 8.4  ×  Symfony 6.4 / 7.2
    # -------------------------------------------------------------------------
    tests:
        name: "Tests (PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }})"
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: ["8.2", "8.3", "8.4"]
                symfony: ["6.4.*", "7.2.*"]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "${{ matrix.php }}"
                  coverage: none

            - name: Pin Symfony version
              run: composer require --no-update "symfony/framework-bundle:${{ matrix.symfony }}"

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction --no-plugins

            - name: Run tests
              run: composer test
